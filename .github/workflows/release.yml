name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package version matches tag
        run: |
          version=$(jq -er '.version' package.json)
          if [ "$GITHUB_REF_NAME" != "v${version}" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $version" >&2
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --draft --generate-notes --title "$GITHUB_REF_NAME"
          fi

  publish-windows:
    name: Publish Windows artifacts
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish Windows release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx --bun electron-forge publish --platform=win32 --arch=x64

  publish-macos:
    name: Publish macOS artifacts
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish macOS release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx --bun electron-forge publish --platform=darwin --arch=universal

  publish-linux:
    name: Publish Linux artifacts
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish Linux release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx --bun electron-forge publish --platform=linux --arch=x64

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - publish-windows
      - publish-macos
      - publish-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make draft release public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease=false
